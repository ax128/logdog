services:
  logwatch:
    build: .
    container_name: logwatch
    restart: unless-stopped
    ports:
      - "11680:8000"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.ssh/id_ed25519:/root/.ssh/id_ed25519:ro
    env_file:
      - .env
