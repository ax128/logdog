services:
  logdog:
    build: .
    container_name: logdog
    restart: unless-stopped
    ports:
      - "127.0.0.1:11680:8000"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ${SSH_KEY_PATH:-~/.ssh/id_ed25519}:/root/.ssh/id_ed25519:ro
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    env_file:
      - .env
