# Runtime config for LogDog.
# Keep secrets in this file if you insist on local-file management.

metrics:
  sample_interval_seconds: 30
  host_system:
    enabled: true
    sample_interval_seconds: 30
    collect_load: true
    collect_network: true
    security:
      enabled: false
      push_on_issue: true
    report:
      include_in_schedule: true
      warn_thresholds:
        cpu_percent: 85
        mem_used_percent: 90
        disk_used_percent: 90

storage:
  db_path: data/logdog.db
  sqlite:
    journal_mode: wal
    synchronous: normal
    busy_timeout_ms: 5000
  retention:
    cleanup_interval_seconds: 86400
    alerts_days: 30
    audit_days: 30
    send_failed_days: 14
    metrics_days: 7
    host_metrics_days: 7
    storm_days: 14

docker:
  pool:
    max_clients: 8
    max_idle_seconds: 60

scheduler:
  max_instances: 1
  coalesce: true
  misfire_grace_time: 30

notify:
  channels:
    local-tel:
      type: telegram
      enabled: true
      bot_tokens:
        - "${BOTTOKEN1}"
      auto_chat_id: true
      message_mode: text

    local-wecom:
      type: wecom
      enabled: false
      targets:
        - "${WECOM_WEBHOOK1}"
      message_mode: md

    prod-tel:
      type: telegram
      enabled: true
      bot_tokens:
        - "${BOTTOKEN1}"
      auto_chat_id: true
      message_mode: text

    prod-wecom:
      type: wecom
      enabled: false
      targets:
        - "${WECOM_WEBHOOK1}"
      message_mode: md

  routing:
    default_channels: []
    rules: []

llm:
  enabled: true
  providers:
    agentop:
      provider_type: openai
      api_base: "https://api.agentop.dev/v1/__gw__/t/8317"
      api_key_env: OPENAI_API_KEY

  default: "agentop/${LLM_MODEL}"

  roles:
    analysis: "agentop/${LLM_MODEL}"
    chat: "agentop/${LLM_MODEL}"

  permissions:
    dangerous_tools: [restart_container, exec_container]
    dangerous_host_allowlist: [prod]

agent:
  authorized_users:
    telegram: []

defaults:
  llm:
    enabled: true
  schedules_mode: append
  schedules:
    - name: default
      interval_seconds: 300
  containers:
    exclude:
      - logdog
  watch:
    queue_maxsize: 1024
    worker_count: 2
    drop_when_full: true

hosts:
  - name: local
    url: unix:///var/run/docker.sock
    notify:
      channels: [local-tel]

  - name: prod
    url: "ssh://${PROD_USER:-root}@${PROD_HOST}:${PROD_PORT:-22}"
    ssh_key: "${PROD_SSH_KEY:-/root/.ssh/id_ed25519}"
    notify:
      channels: [prod-tel]
